/* =========================================================
   Industry Partner — Concept Visualisation
   Nautical-chart aesthetic, layered language register
   ========================================================= */

:root {
  /* Palette — ink, parchment, sea-mist, marine, copper */
  --ink:        #0E2A47;
  --ink-2:      #133A5C;
  --ink-soft:   #486581;
  --paper:      #F2EADB;
  --paper-2:    #EBE2D0;
  --mist:       #DDD6C4;
  --rule:       rgba(14, 42, 71, 0.18);
  --rule-soft:  rgba(14, 42, 71, 0.10);
  --marine:     #1F6F7B;
  --marine-2:   #2B8A99;
  --copper:     #B5613B;
  --copper-2:   #C97A52;
  --signal:     #C8A14B;
  --teal-tint:  rgba(31, 111, 123, 0.12);
  --copper-tint:rgba(181, 97, 59, 0.12);

  --display: "Newsreader", "Spectral", Georgia, serif;
  --body: "DM Sans", system-ui, -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
  overflow-x: hidden;
}

/* Chart-paper background — hairline grid + edge tick marks */
.chart-paper {
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,255,255,0.55), transparent 60%),
    radial-gradient(ellipse 70% 60% at 90% 90%, rgba(181,97,59,0.04), transparent 60%),
    linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  position: relative;
}

.chart-paper::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(to right, var(--rule-soft) 1px, transparent 1px),
    linear-gradient(to bottom, var(--rule-soft) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 100% 100% at 50% 40%, black 60%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 40%, black 60%, transparent 100%);
}

/* Faint paper noise */
.chart-paper::after {
  content: "";
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.35;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.16  0 0 0 0 0.28  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* Typography */
.display { font-family: var(--display); font-weight: 500; letter-spacing: -0.01em; }
.mono { font-family: var(--mono); font-feature-settings: "ss01", "ss02"; }
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.coord {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
}

h1, h2, h3 { font-family: var(--display); font-weight: 500; letter-spacing: -0.015em; line-height: 1.08; margin: 0; }
h1 { font-size: clamp(40px, 5.4vw, 76px); }
h2 { font-size: clamp(26px, 2.6vw, 36px); }
h3 { font-size: clamp(20px, 1.8vw, 26px); }

p { margin: 0 0 0.75em; text-wrap: pretty; }
a { color: inherit; }

/* Layout shell */
.shell { max-width: 1480px; margin: 0 auto; padding: 0 32px; position: relative; }
.section { padding: 96px 0; position: relative; }
.section + .section { border-top: 1px solid var(--rule-soft); }

/* Figure index rail */
.fig-index { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 45; display: flex; flex-direction: column; gap: 1px; padding: 12px 6px 12px 10px; font-family: var(--mono); border-radius: 0 8px 8px 0; transition: background .25s ease, box-shadow .25s ease; }
.fig-index:hover { background: rgba(255,252,245,0.96); box-shadow: 3px 0 28px rgba(31,42,55,0.10); }
.fig-index::before { content: ""; position: absolute; left: 15px; top: 18px; bottom: 18px; width: 1px; background: var(--rule); }
.fig-index-item { position: relative; display: flex; align-items: center; background: none; border: none; cursor: pointer; padding: 7px 0; color: var(--ink-soft); transition: color .2s ease; }
.fig-index-dot { position: relative; z-index: 1; flex: none; width: 9px; height: 9px; border-radius: 50%; border: 1.4px solid var(--ink-soft); background: var(--paper); transition: all .25s ease; }
.fig-index-text { display: inline-flex; align-items: baseline; gap: 8px; white-space: nowrap; font-size: 10px; letter-spacing: 1.1px; text-transform: uppercase; max-width: 0; margin-left: 0; opacity: 0; overflow: hidden; transition: max-width .35s ease, margin-left .35s ease, opacity .25s ease; }
.fig-index-num { font-size: 8.5px; opacity: 0.55; }
.fig-index:hover .fig-index-text { max-width: 240px; margin-left: 11px; opacity: 1; }
.fig-index-item:hover { color: var(--ink); }
.fig-index-item:hover .fig-index-dot { border-color: var(--marine); }
.fig-index-item.active { color: var(--ink); }
.fig-index-item.active .fig-index-dot { border-color: var(--marine); background: var(--marine); box-shadow: 0 0 0 3px rgba(19,58,92,0.13); }
@media (max-width: 1080px) { .fig-index { display: none; } }

/* Crosshair / compass corner ornaments */
.frame-cross {
  position: absolute;
  width: 14px; height: 14px;
  border: 1px solid var(--ink);
  opacity: 0.65;
}
.frame-cross::before, .frame-cross::after {
  content: ""; position: absolute; background: var(--ink); opacity: 0.65;
}
.frame-cross::before { left: 50%; top: -4px; bottom: -4px; width: 1px; transform: translateX(-50%); }
.frame-cross::after  { top: 50%; left: -4px; right: -4px; height: 1px; transform: translateY(-50%); }

/* Buttons / chips */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 10px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  background: rgba(255,255,255,0.35);
  white-space: nowrap;
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--marine); }

.btn {
  appearance: none; border: 1px solid var(--ink); background: var(--paper);
  color: var(--ink); font-family: var(--body); font-size: 13px; font-weight: 500;
  padding: 9px 14px; border-radius: 4px; cursor: default;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background 0.18s, color 0.18s;
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.ghost { background: transparent; }
.btn.solid { background: var(--ink); color: var(--paper); }
.btn.solid:hover { background: var(--ink-2); }

/* Cards */
.card {
  background: rgba(255, 252, 245, 0.66);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 20px;
  position: relative;
}
.card .corner {
  position: absolute; width: 10px; height: 10px;
  border: 1px solid var(--ink); opacity: 0.6;
}
.card .corner.tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.card .corner.tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
.card .corner.bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
.card .corner.br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

/* Tag pill (the manifest tag) */
.tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 11px;
  padding: 3px 7px;
  border: 1px solid var(--rule);
  border-radius: 3px;
  background: rgba(255,255,255,0.5);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tag .swatch { width: 7px; height: 7px; border-radius: 1px; background: var(--marine); }

/* Subtle dashed shipping-lane look */
.lane-dash {
  stroke-dasharray: 6 5;
  animation: lane-march 22s linear infinite;
}
@keyframes lane-march {
  from { stroke-dashoffset: 0; }
  to { stroke-dashoffset: -1000; }
}
.lane-dash.paused { animation-play-state: paused; }

/* Cargo manifest icon that travels */
.cargo {
  filter: drop-shadow(0 1px 0 rgba(14, 42, 71, 0.18));
}

/* Station ring (hover/selected state) */
.station-ring {
  transition: stroke-width 0.2s, stroke-opacity 0.2s, transform 0.2s;
  transform-box: fill-box;
  transform-origin: center;
}
.station:hover .station-ring { stroke-width: 2.2; stroke-opacity: 1; }
.station.selected .station-ring { stroke-width: 2.6; stroke-opacity: 1; }
.station { cursor: default; }

/* Bottom-up bracketed label */
.bracket {
  position: relative; padding: 0 12px;
}
.bracket::before, .bracket::after {
  content: ""; position: absolute; top: 0; bottom: 0; width: 8px;
  border: 1px solid var(--ink-soft);
}
.bracket::before { left: 0; border-right: 0; }
.bracket::after  { right: 0; border-left: 0; }

/* Soft pulse for the highlighted artefact */
@keyframes pulse-ring {
  0%, 100% { opacity: 0.0; r: 14; }
  50% { opacity: 0.4; r: 22; }
}

/* Hover lift */
.lift { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
.lift:hover { transform: translateY(-2px); border-color: var(--ink); }

/* Slider */
input[type="range"].chart-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; background: transparent;
}
input[type="range"].chart-slider::-webkit-slider-runnable-track {
  height: 2px; background: var(--ink); opacity: 0.55;
}
input[type="range"].chart-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; margin-top: -7px;
  border-radius: 50%; background: var(--paper); border: 1.5px solid var(--ink);
}
input[type="range"].chart-slider::-moz-range-track { height: 2px; background: var(--ink); opacity: 0.55; }
input[type="range"].chart-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--paper); border: 1.5px solid var(--ink); }

/* Tabs / register switch */
.register-switch {
  display: inline-flex; border: 1px solid var(--ink); border-radius: 4px; overflow: hidden;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
}
.register-switch button {
  appearance: none; border: 0; background: transparent; color: var(--ink);
  padding: 7px 12px; cursor: default; border-right: 1px solid var(--ink);
}
.register-switch button:last-child { border-right: 0; }
.register-switch button.on { background: var(--ink); color: var(--paper); }

/* Detail panel slide */
.panel {
  background: rgba(255,252,245,0.78);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 24px 28px;
}

/* Footer */
.footer {
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft);
  letter-spacing: 0.04em;
  padding: 28px 0;
  border-top: 1px solid var(--rule-soft);
}

/* Util */
.flex { display: flex; }
.col  { display: flex; flex-direction: column; }
.between { justify-content: space-between; }
.center  { align-items: center; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
.gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; }
.gap-32 { gap: 32px; }
.wrap { flex-wrap: wrap; }
.full { width: 100%; }
.muted { color: var(--ink-soft); }
.small { font-size: 12.5px; }
.tiny { font-size: 11px; }

/* Reveal animation for newly visible panels */
@keyframes slide-down-fade {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal { animation: slide-down-fade 0.28s ease-out; }

/* Mini map grid for clusters */
.clusters-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
}
.clusters-grid .node {
  aspect-ratio: 1; border: 1px solid var(--rule); border-radius: 2px;
  background: rgba(255,255,255,0.5);
}
.clusters-grid .node.active { background: var(--marine); border-color: var(--marine); }
.clusters-grid .node.cluster { background: var(--copper); border-color: var(--copper); box-shadow: 0 0 0 2px var(--copper-tint); }

/* Aesthetic variants */
body.variant-editorial { --paper: #F6F2E8; --paper-2: #EFE9DA; }
body.variant-editorial .chart-paper::before { background-size: 64px 64px; opacity: 0.7; }
body.variant-contemporary {
  --paper: #ECEEEF; --paper-2: #E1E5E7; --mist: #D4D9DB;
  --ink: #0E141C; --ink-2: #1A2330; --ink-soft: #5C6773;
  --marine: #0D8C8E; --copper: #C2492B;
  --rule: rgba(14,20,28,0.16); --rule-soft: rgba(14,20,28,0.08);
}
body.variant-contemporary .chart-paper::after { opacity: 0.15; }
body.variant-contemporary { font-family: "Inter Tight", var(--body); }

/* Overlay tint */
.overlay-tag {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  padding: 2px 6px; border-radius: 2px; border: 1px solid currentColor;
}
.overlay-seci    { color: var(--marine); }
.overlay-maynard { color: var(--copper); }
.overlay-roles   { color: var(--signal); }

  </style>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

  <script type="text/babel" data-presets="env,react">

function lanePath(points) {
  // Smooth curve through points using cardinal-like cubic
  let d = `M ${points[0][0]} ${points[0][1]}`;
  for (let i = 0; i < points.length - 1; i++) {
    const [x0, y0] = points[i];
    const [x1, y1] = points[i + 1];
    const mx = (x0 + x1) / 2;
    d += ` C ${mx} ${y0}, ${mx} ${y1}, ${x1} ${y1}`;
  }
  return d;
}

// Main hero flow
function HeroFlow({ selected, setSelected, overlays, playing, cycle }) {
  const [t, setT] = useState(0); // 0..1 cargo position along main lane
  const rafRef = useRef(null);
  const lastRef = useRef(null);

  // Animate cargo position
  useEffect(() => {
    if (!playing) {
      cancelAnimationFrame(rafRef.current);
      return;
    }
    const tick = (now) => {
      if (lastRef.current == null) lastRef.current = now;
      const dt = (now - lastRef.current) / 1000;
      lastRef.current = now;
      setT((prev) => (prev + dt / 14) % 1); // 14s loop
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(rafRef.current);
      lastRef.current = null;
    };
  }, [playing]);

  // Coordinates
  const W = 1500, H = 560;
  const ARRIVAL = [120, 320];
  const L1 = [380, 300];
  const L2 = [740, 320];
  const L3 = [1120, 300];
  const IMPACT = [1380, 320];

  const stations = [
    { key: "learn",    n: 1, x: L1[0], y: L1[1], label: "Learn", sublabel: "GenAI companion", secLabel: "EXTERNALISATION", color: "var(--marine)", authority: "andragogy · design authority" },
    { key: "share",    n: 2, x: L2[0], y: L2[1], label: "Share", sublabel: "Knowledge platform", secLabel: "COMBINATION", color: "var(--marine)" },
    { key: "innovate", n: 3, x: L3[0], y: L3[1], label: "Innovate", sublabel: "Innovation platform", secLabel: "INTERNALISATION", color: "var(--copper)" },
  ];

  // Main lane polyline (gentle)
  const mainPoints = [ARRIVAL, L1, L2, L3, IMPACT];
  const mainD = lanePath(mainPoints);

  // Path measurement for cargo position
  const pathRef = useRef(null);
  const [pathLen, setPathLen] = useState(1);
  useEffect(() => {
    if (pathRef.current) setPathLen(pathRef.current.getTotalLength());
  }, []);

  let cargoPt = ARRIVAL;
  if (pathRef.current) {
    const p = pathRef.current.getPointAtLength(t * pathLen);
    cargoPt = [p.x, p.y];
  }

  // Feedback arc (impact → arrival) — top arc returning knowledge
  const fbD = `M ${IMPACT[0]} ${IMPACT[1] - 30} C ${IMPACT[0]} ${60}, ${ARRIVAL[0]} ${60}, ${ARRIVAL[0]} ${ARRIVAL[1] - 30}`;

  // Cluster nodes hovering above Share (subtle)

    const dots = [];
    for (let i = 0; i < 14; i++) {

      dots.push([L2[0] + Math.cos(angle) * r, L2[1] - 130 + Math.sin(angle) * (r * 0.5)]);

    return dots;

    x: 58 + i * 14,
    y: 460 + (i % 2) * 6,
    active: i < cycle,

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="full" style={{ maxHeight: 620, display: "block" }} preserveAspectRatio="xMidYMid meet">
      <defs>
        {/* SECI spine gradient — tacit (paper) → externalisation/combination (marine)

            colour band beneath the formal shipping lane; the integrating theory
            embodied as the lane's substrate rather than as an opt-in overlay. */}
        <linearGradient id="seci-spine" x1="0" y1="0" x2="1" y2="0">

          <stop offset="10%"  stopColor="#1F6F7B" stopOpacity="0.18" />
          <stop offset="26%"  stopColor="#1F6F7B" stopOpacity="0.42" />
          <stop offset="50%"  stopColor="#2B8A99" stopOpacity="0.50" />
          <stop offset="74%"  stopColor="#B5613B" stopOpacity="0.45" />
          <stop offset="90%"  stopColor="#C97A52" stopOpacity="0.22" />
          <stop offset="100%" stopColor="#DDD6C4" stopOpacity="0" />
        </linearGradient>
      </defs>

      {/* Lat/lon ticks along edges */}
      <g fontFamily="var(--mono)" fontSize="9" fill="var(--ink-soft)" opacity="0.55">
        {[100, 220, 340, 460].map((y) => (
          <g key={"yt" + y}>
            <line x1="0" y1={y} x2="10" y2={y} stroke="var(--ink-soft)" strokeWidth="0.6" />
            <text x="14" y={y + 3}>{(46 - y / 24).toFixed(1)}°N</text>
          </g>
        ))}
        {[200, 500, 800, 1100, 1400].map((x) => (
          <g key={"xt" + x}>
            <line x1={x} y1="0" x2={x} y2="10" stroke="var(--ink-soft)" strokeWidth="0.6" />

          </g>
        ))}
      </g>

      <Compass x={W - 70} y={80} r={32} />

      {/* Feedback arc — drawn behind */}

      <text fontFamily="var(--mono)" fontSize="10" letterSpacing="2" fill="var(--copper)" x={W / 2 - 90} y="58">

      {/* Vessels (acquisitions in the system) */}

        </text>
      </g>

      {/* Knowledge cluster above Share */}
      <g opacity="0.85">
        {clusterDots.map((d, i) => (
          <circle
            key={i}
            cx={d[0]}
            cy={d[1]}
            r={i === 5 || i === 9 || i === 12 ? 4 : 2.2}
            fill={i === 5 || i === 9 || i === 12 ? "var(--copper)" : "var(--marine)"}
            opacity={i === 5 || i === 9 || i === 12 ? 0.9 : 0.55}
          />
        ))}
        {/* connecting hairlines for one cluster */}
        <g stroke="var(--copper)" strokeWidth="0.6" strokeOpacity="0.55">
          <line x1={clusterDots[5][0]} y1={clusterDots[5][1]} x2={clusterDots[9][0]} y2={clusterDots[9][1]} />
          <line x1={clusterDots[9][0]} y1={clusterDots[9][1]} x2={clusterDots[12][0]} y2={clusterDots[12][1]} />
          <line x1={clusterDots[12][0]} y1={clusterDots[12][1]} x2={clusterDots[5][0]} y2={clusterDots[5][1]} />
        </g>
        <text x={L2[0] + 80} y={L2[1] - 165} fontFamily="var(--mono)" fontSize="9.5" letterSpacing="1.4" fill="var(--ink-soft)">
          EMERGENT KNOWLEDGE CLUSTERS
        </text>
      </g>

      {/* SECI spine — gradient band beneath the formal lane. v2.0: SECI promoted
          from overlay toggle to integrating-theory spine; gradient is always
          visible. The dashed black lane sits on top as the formal shipping lane. */}
      <path d={mainD} fill="none" stroke="url(#seci-spine)" strokeWidth="24" strokeLinecap="round" />

      {/* Main shipping lane */}
      <path
        ref={pathRef}
        d={mainD}
        fill="none"
        stroke="var(--ink)"
        strokeWidth="1.4"
        className={`lane-dash ${playing ? "" : "paused"}`}
        opacity="0.85"
      />

      {/* SECI mode labels along the lane — always-on annotations of the spine.
          The per-station SECI overlay still controls the fuller per-port boxes. */}
      <g fontFamily="var(--mono)" fontSize="9" letterSpacing="1.6" fill="var(--marine)" textAnchor="middle" opacity="0.75">

        <text x={(L1[0] + L2[0]) / 2}     y="372">→ COMBINATION →</text>
        <text x={(L2[0] + L3[0]) / 2}     y="372" fill="var(--copper)">→ INTERNALISATION · SOCIALISATION →</text>
        <text x={(L3[0] + IMPACT[0]) / 2 + 28} y="372" fill="var(--copper)" opacity="0.55">→ re-tacit → next cycle</text>
      </g>

      {/* Quadruple-duty metadata indicator on the lane between L1 → L2.

      <g transform={`translate(${(L1[0] + L2[0]) / 2 - 122}, ${(L1[1] + L2[1]) / 2 - 70})`}>
        <rect width="244" height="30" rx="3" fill="rgba(255,252,245,0.85)" stroke="var(--ink)" strokeOpacity="0.5" />

          <rect x="38" width="34" height="8" fill="var(--copper)" opacity="0.7" />
          <rect x="76" width="34" height="8" fill="var(--signal)" opacity="0.7" />

            <text x="50" y="28" textAnchor="middle" fontFamily="var(--body)" fontSize="10.5" fill="var(--ink)">extending capacity</text>
          </g>
        </g>
      )}

      {/* Roles overlay near L3 */}
      {overlays.roles && (
        <g className="reveal" transform={`translate(${L3[0] - 80}, ${L3[1] - 170})`}>
          {[
            ["Initiator", "frames HMW"],
            ["Contributor", "all employees"],
            ["Evaluator", "domain experts"],
            ["Stakeholder", "mgmt sponsors"],
          ].map((r, i) => (
            <g key={r[0]} transform={`translate(0, ${i * 22})`}>
              <rect width="160" height="18" fill="rgba(255,252,245,0.85)" stroke="var(--signal)" strokeWidth="0.7" rx="2" />

              <text x="74" y="12" fontFamily="var(--body)" fontSize="10" fill="var(--ink-soft)">{r[1]}</text>
            </g>

      )}

      {/* Animated cargo on lane */}
      <g>
        <circle cx={cargoPt[0]} cy={cargoPt[1]} r="14" fill="none" stroke="var(--marine)" strokeOpacity="0.4" strokeWidth="1" />
        <Cargo x={cargoPt[0]} y={cargoPt[1]} scale={1} />
      </g>

      {/* Caption strip beneath lane — flow legend */}
      <g fontFamily="var(--mono)" fontSize="10" fill="var(--ink-soft)" letterSpacing="1.4">
        <text x={L1[0]} y={H - 60} textAnchor="middle">→ STRUCTURED ARTEFACT</text>
        <text x={L2[0]} y={H - 60} textAnchor="middle">→ VISIBLE · CLUSTERED</text>
        <text x={L3[0]} y={H - 60} textAnchor="middle">→ HOW MIGHT WE</text>
        <text x={IMPACT[0]} y={H - 60} textAnchor="middle">→ IMPLEMENTED</text>
      </g>
    </svg>
  );
}

    const cells = [];
    for (let i = 0; i < 32; i++) cells.push({ i, active: false, cluster: false });
    // Light activity scattered
    const activeIdx = [1, 3, 4, 8, 11, 12, 15, 17, 19, 22, 24, 27, 30];
    activeIdx.forEach((i) => (cells[i].active = true));
    // Cluster — increasing density
    const clusterIdx = [10, 11, 18, 19, 26, 27].slice(0, Math.min(threshold * 2, 6));
    clusterIdx.forEach((i) => { cells[i].active = true; cells[i].cluster = true; });

// Baseline rising chart — small inline SVG
function Baseline({ cycle }) {
  const W = 900, H = 110;
  const pad = 12;
  const xs = Array.from({ length: 6 }, (_, i) => pad + i * ((W - pad * 2) / 5));
  const baseline = [82, 74, 66, 58, 50, 42]; // y values descend = baseline rising
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ marginTop: 12 }}>
      {/* Bands */}
      <rect x="0" y="0" width={W} height={H} fill="none" stroke="var(--rule-soft)" />
      {/* Tipping band */}
      <rect x="0" y="6" width={W} height="14" fill="var(--copper-tint)" />
      <text x="6" y="18" fontFamily="var(--mono)" fontSize="9" letterSpacing="1.2" fill="var(--copper)">PIPPARD'S LADDER · TIPPING THRESHOLD</text>

      {/* Baseline curve */}
      <path
        d={`M ${xs[0]} ${baseline[0]} ${xs.map((x, i) => `L ${x} ${baseline[i]}`).join(" ")}`}
        fill="none" stroke="var(--marine)" strokeWidth="1.6"
      />
      {/* Filled area */}
      <path
        d={`M ${xs[0]} ${baseline[0]} ${xs.map((x, i) => `L ${x} ${baseline[i]}`).join(" ")} L ${xs[5]} ${H} L ${xs[0]} ${H} Z`}
        fill="var(--teal-tint)"
      />
      {/* Cycle markers */}
      {xs.map((x, i) => (
        <g key={i}>
          <line x1={x} y1={baseline[i]} x2={x} y2={H - 4} stroke="var(--rule)" strokeWidth="0.6" />
          <circle cx={x} cy={baseline[i]} r={i === cycle ? 5 : 3} fill={i === cycle ? "var(--copper)" : "var(--marine)"} stroke="var(--paper)" strokeWidth="1" />
          <text x={x} y={H - 2} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="var(--ink-soft)">t{i}</text>
        </g>
      ))}
      <text x={W - 6} y={baseline[5] - 6} textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill="var(--marine)" letterSpacing="1.2">
        ORG. BASELINE → EXTEND
      </text>
    </svg>
  );
}

// ───────────────────────── INNOVATION FLYWHEEL (NESTED) ─────────────────────────
function Flywheel() {
  const [stage, setStage] = useStateMech(0);
  const stages = [
    { key: "Collect", desc: "Goal-driven HMW campaign, prompted by a Layer 2 cluster.", color: "var(--marine)" },
    { key: "Engage", desc: "Cross-cohort contribution — Beretta's (2018) functional diversity premium.", color: "var(--ink-2)" },
    { key: "Manage", desc: "Phase-gated evaluation with reasoned, transparent feedback.", color: "var(--copper)" },
    { key: "Measure", desc: "Impact tracked back to the originating practitioner insight.", color: "var(--signal)" },
  ];

  // Auto-rotate
  React.useEffect(() => {
    const id = setInterval(() => setStage((s) => (s + 1) % 4), 2600);
    return () => clearInterval(id);
  }, []);

  const cx = 150, cy = 150, r = 100;
  return (
    <div className="card" style={{ padding: 28 }}>
      <div className="corner tl"></div><div className="corner tr"></div>
      <div className="corner bl"></div><div className="corner br"></div>
      <div className="eyebrow">Nested flywheel — within Layer 3</div>
      <h3 className="display" style={{ marginTop: 6 }}>Two sources of momentum.</h3>
      <p className="small muted" style={{ marginTop: 6, maxWidth: 640 }}>
        The framework-level cycle builds capacity across acquisition cycles. The innovation-level cycle builds innovation capability within each cycle. The system has two flywheels turning at different scales.
      </p>

      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 28, marginTop: 16, alignItems: "center" }}>
        <svg viewBox="0 0 300 300" width="300" height="300">
          <circle cx={cx} cy={cy} r={r + 40} fill="none" stroke="var(--rule)" strokeWidth="0.8" strokeDasharray="2 4" />
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--ink)" strokeWidth="0.9" />
          {stages.map((s, i) => {
            const angle = (i / 4) * Math.PI * 2 - Math.PI / 2;
            const x = cx + Math.cos(angle) * r;
            const y = cy + Math.sin(angle) * r;
            const active = i === stage;
            return (
              <g key={s.key} onMouseEnter={() => setStage(i)}>
                <circle cx={x} cy={y} r={active ? 36 : 31} fill={active ? s.color : "var(--paper)"} stroke={s.color} strokeWidth={active ? 0 : 1.2} />
                <text x={x} y={y + 4} textAnchor="middle" fontFamily="var(--mono)" fontSize="10" fill={active ? "var(--paper)" : "var(--ink)"} letterSpacing="1.2">
                  {s.key.toUpperCase()}
                </text>
              </g>
            );
          })}
          {/* direction arrow on the ring, in the gap between Collect and Engage */}
          <path d="M -5 -4 L 5 0 L -5 4 Z" fill="var(--ink)" transform={`translate(${cx + Math.cos(-Math.PI / 4) * r}, ${cy + Math.sin(-Math.PI / 4) * r}) rotate(45)`} />
        </svg>
        <div className="col gap-8">
          <div className="eyebrow" style={{ color: stages[stage].color }}>{stages[stage].key.toUpperCase()}</div>
          <p>{stages[stage].desc}</p>
          <div className="flex gap-6 wrap" style={{ marginTop: 8 }}>
            {stages.map((s, i) => (
              <button key={s.key} className={`btn ghost small ${i === stage ? "solid" : ""}`} onClick={() => setStage(i)}>
                {s.key}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// Fixed left-edge index of the figures on the canvas; highlights the figure
// nearest the viewport centre and scrolls to any on click.
function FigureIndex() {
  const figs = [
    { id: "fig-flow", label: "Knowledge flow" },
    { id: "fig-cohorts", label: "Acquisition cohorts" },
    { id: "fig-reflection", label: "Reflection architecture" },
    { id: "fig-metadata", label: "Quadruple-duty metadata" },
    { id: "fig-outcomes", label: "Four outcomes" },
    { id: "fig-pipeline", label: "Automation pipeline" },
    { id: "fig-flywheel", label: "Nested flywheel" },
    { id: "fig-architecture", label: "Framework architecture" },
  ];
  const [active, setActive] = useState(0);
  useEffect(() => {
    const secs = figs.map((f) => document.getElementById(f.id));
    if (!secs.some(Boolean)) return;
    const onScroll = () => {
      const mid = window.innerHeight / 2;
      let best = 0, bestD = Infinity;
      secs.forEach((s, i) => {
        if (!s) return;
        const r = s.getBoundingClientRect();
        const d = Math.abs(r.top + r.height / 2 - mid);
        if (d < bestD) { bestD = d; best = i; }
      });
      setActive(best);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
    };
  }, []);
  const go = (id) => {
    const el = document.getElementById(id);
    if (!el) return;
    window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 72, behavior: "smooth" });
  };
  return (
    <nav className="fig-index" aria-label="Figure index">
      {figs.map((f, i) => (
        <button key={f.id} className={`fig-index-item ${i === active ? "active" : ""}`} onClick={() => go(f.id)} title={f.label}>
          <span className="fig-index-dot"></span>
          <span className="fig-index-text"><span className="fig-index-num">{String(i + 1).padStart(2, "0")}</span>{f.label}</span>
        </button>
      ))}
    </nav>
  );
}
